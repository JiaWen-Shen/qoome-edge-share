不要急，不要停。你的身體會告訴你哪邊出狀況。`

      wordCount: 340,
      text: `我問你喔，你 MyFitnessPal 上的這 500 大卡，是均勻分散還是集中某幾個來源？這個問題藏著答案。

機制上講，人身體沒有「熱量感知器」這個東西。它感知的是食物送進來的「信號」——升糖速度、胰島素反應、發炎反應、飽足訊號。所以同樣 500 大卡，一杯手搖飲跟一份雞胸+蔬菜，會走完全不同的代謝路徑。前者很可能讓胰島素飆高、把能量塞進脂肪細胞；後者讓你飽足、提供合成肌肉的原料。一個月下來，留在身上的東西不一樣。這是我為什麼說「食物是信號，不是熱量」。

這是我的個人心得也好，是機制上說得通也好，最後驗證的人還是你自己。先試試看，你的身體會告訴你。不要急，不要停。`

      text: `你的直覺對了。BMI 23 是看起來在正常範圍沒錯，但 BMI 這個指標真的不夠用。它只看身高體重的比例，不看你身上是肌肉還是脂肪、不看脂肪堆在哪裡。

      text: `Ozempic 確實有用，這點我承認，但我要請你先停下來想幾件事。

// ============ STATE ============
const STORAGE_KEY = "dr-ben-eval-v2";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function initBlinding() {
  const blind = {};
  TOPICS.forEach(t => {
    blind[t.id] = Math.random() < 0.5 ? { A: "v3", B: "v4" } : { A: "v4", B: "v3" };
  });
  return blind;
}

function emptyScoreSide() {
  const s = { flags: [], recall: "", scenarios: [] };
  DIMENSIONS.forEach(d => { s[d.key] = null; });
  return s;
}

function initScores() {
  const s = {};
  TOPICS.forEach(t => {
    s[t.id] = { A: emptyScoreSide(), B: emptyScoreSide(), preference: null, comment: "" };
  });
  return s;
}

function initMeta() {
  return {
    consistency_A: null,
    consistency_B: null,
    distinctiveness: null,
    overall_pref: null,
    meta_comment: ""
  };
}

let state = loadState();
if (!state || state.version !== 2) {
  state = {
    version: 2,
    rater: "",
    started: new Date().toISOString(),
    blinding: initBlinding(),
    scores: initScores(),
    meta: initMeta(),
    currentView: "1"  // "1".."5" or "meta"
  };
  saveState();
}

// ============ HELPERS ============
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function isTopicDone(id) {
  const s = state.scores[id];
  if (!s.preference) return false;
  for (const side of ["A", "B"]) {
    for (const dim of DIMENSIONS) {
      if (s[side][dim.key] === null) return false;
    }
  }
  return true;
}

function isMetaDone() {
  const m = state.meta;
  return m.consistency_A !== null && m.consistency_B !== null &&
         m.distinctiveness !== null && m.overall_pref !== null;
}

// ============ RENDER ============
function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  TOPICS.forEach(t => {
    const div = document.createElement("div");
    div.className = "tab" + (String(t.id) === state.currentView ? " active" : "") + (isTopicDone(t.id) ? " done" : "");
    div.textContent = `${t.id}. ${t.title}`;
    div.onclick = () => { state.currentView = String(t.id); saveState(); render(); window.scrollTo(0,0); };
    tabs.appendChild(div);
  });
  const metaTab = document.createElement("div");
  metaTab.className = "tab meta" + (state.currentView === "meta" ? " active" : "") + (isMetaDone() ? " done" : "");
  metaTab.textContent = "📊 Meta（跨題）";
  metaTab.onclick = () => { state.currentView = "meta"; saveState(); render(); window.scrollTo(0,0); };
  tabs.appendChild(metaTab);
}

function renderProgress() {
  const done = TOPICS.filter(t => isTopicDone(t.id)).length;
  const metaTxt = isMetaDone() ? " + Meta ✓" : "";
  document.getElementById("progress").textContent = `${done} / ${TOPICS.length} 完成${metaTxt}`;
}

function renderLikert(side, dimKey, currentValue) {
  return [1,2,3,4,5].map(v => `
    <label>
      <input type="radio" name="${side}-${dimKey}" value="${v}" ${currentValue === v ? "checked" : ""} onchange="setScore('${side}', '${dimKey}', ${v})">
      <span class="opt">${v}</span>
    </label>
  `).join("");
}

function renderMetaLikert(field, currentValue) {
  return [1,2,3,4,5].map(v => `
    <label>
      <input type="radio" name="meta-${field}" value="${v}" ${currentValue === v ? "checked" : ""} onchange="setMetaField('${field}', ${v})">
      <span class="opt">${v}</span>
    </label>
  `).join("");
}

function renderChip(type, side, listField, item, checked) {
  return `
    <span class="chip ${type}">
      <label>
        <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleListItem('${side}', '${listField}', '${item.key}')">
        <span class="opt">${item.label}</span>
      </label>
    </span>
  `;
}

// ============ EVENT HANDLERS ============
function setScore(side, dimKey, v) {
  state.scores[parseInt(state.currentView,10)][side][dimKey] = v;
  saveState(); renderTabs(); renderProgress();
}

function setPref(p) {
  state.scores[parseInt(state.currentView,10)].preference = p;
  saveState(); renderTabs(); renderProgress();
}

function setRecall(side, v) {
  state.scores[parseInt(state.currentView,10)][side].recall = v;
  saveState();
}

function toggleListItem(side, listField, key) {
  const arr = state.scores[parseInt(state.currentView,10)][side][listField];
  const i = arr.indexOf(key);
  if (i >= 0) arr.splice(i,1); else arr.push(key);
  saveState();
}

function setComment(v) {
  state.scores[parseInt(state.currentView,10)].comment = v;
  saveState();
}

function setMetaField(field, v) {
  state.meta[field] = v;
  saveState(); renderTabs(); renderProgress();
}

function prevView() {
  if (state.currentView === "meta") { state.currentView = "5"; }
  else {
    const id = parseInt(state.currentView,10);
    if (id > 1) state.currentView = String(id - 1);
  }
  saveState(); render(); window.scrollTo(0,0);
}

function nextView() {
  if (state.currentView === "meta") { showSummary(); return; }
  const id = parseInt(state.currentView,10);
  if (id < TOPICS.length) state.currentView = String(id + 1);
  else state.currentView = "meta";
  saveState(); render(); window.scrollTo(0,0);
}

function resetAll() {
  if (!confirm("確定要清除所有評分？這會重新隨機 A/B 配對。")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {
    version: 2,
    rater: document.getElementById("rater").value,
    started: new Date().toISOString(),
    blinding: initBlinding(),
    scores: initScores(),
    meta: initMeta(),
    currentView: "1"
  };
  saveState(); render();
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("rater").value = state.rater || "";
  document.getElementById("rater").addEventListener("input", e => { state.rater = e.target.value; saveState(); });
});

// ============ SUMMARY ============
function avg(arr) {
  const filt = arr.filter(x => x !== null);
  if (!filt.length) return null;
  return filt.reduce((a,b) => a+b, 0) / filt.length;
}

function showSummary() {
  const modal = document.getElementById("summary-modal");
  const body = document.getElementById("summary-body");

  const rows = TOPICS.map(t => {
    const blind = state.blinding[t.id];
    const s = state.scores[t.id];
    const avgA = avg(DIMENSIONS.map(d => s.A[d.key]));
    const avgB = avg(DIMENSIONS.map(d => s.B[d.key]));
    const prefMap = { A: blind.A, B: blind.B, tie: "tie" };
    const prefUnblinded = s.preference ? prefMap[s.preference] : "—";
    return `<tr>
      <td>${t.id}. ${t.title}</td>
      <td>A=<strong>${blind.A}</strong> · B=<strong>${blind.B}</strong></td>
      <td>${avgA !== null ? avgA.toFixed(2) : "—"}</td>
      <td>${avgB !== null ? avgB.toFixed(2) : "—"}</td>
      <td><strong>${prefUnblinded}</strong></td>
    </tr>`;
  }).join("");

  const v4Pref = TOPICS.filter(t => {
    const s = state.scores[t.id];
    if (!s.preference || s.preference === "tie") return false;
    return state.blinding[t.id][s.preference] === "v4";
  }).length;
  const v3Pref = TOPICS.filter(t => {
    const s = state.scores[t.id];
    if (!s.preference || s.preference === "tie") return false;
    return state.blinding[t.id][s.preference] === "v3";
  }).length;
  const ties = TOPICS.filter(t => state.scores[t.id].preference === "tie").length;

  // Per-dimension averages across all topics by version
  const dimAvgRows = DIMENSIONS.map(d => {
    const v3Scores = [], v4Scores = [];
    TOPICS.forEach(t => {
      const blind = state.blinding[t.id];
      const s = state.scores[t.id];
      const aVal = s.A[d.key], bVal = s.B[d.key];
      if (blind.A === "v3") { if (aVal!==null) v3Scores.push(aVal); if (bVal!==null) v4Scores.push(bVal); }
      else { if (aVal!==null) v4Scores.push(aVal); if (bVal!==null) v3Scores.push(bVal); }
    });
    const v3Avg = avg(v3Scores), v4Avg = avg(v4Scores);
    return `<tr>
      <td>${d.name}<br><small style="color:var(--muted);">${d.group}</small></td>
      <td>${v3Avg !== null ? v3Avg.toFixed(2) : "—"}</td>
      <td>${v4Avg !== null ? v4Avg.toFixed(2) : "—"}</td>
      <td>${(v3Avg !== null && v4Avg !== null) ? (v4Avg - v3Avg >= 0 ? "+" : "") + (v4Avg - v3Avg).toFixed(2) : "—"}</td>
    </tr>`;
  }).join("");

  // Flag tallies by version
  const flagTally = { v3: {}, v4: {} };
  FLAGS.forEach(f => { flagTally.v3[f.key] = 0; flagTally.v4[f.key] = 0; });
  TOPICS.forEach(t => {
    const blind = state.blinding[t.id];
    const s = state.scores[t.id];
    s.A.flags.forEach(fk => flagTally[blind.A][fk]++);
    s.B.flags.forEach(fk => flagTally[blind.B][fk]++);
  });
  const flagRows = FLAGS.map(f => `
    <tr><td>${f.label}</td><td>${flagTally.v3[f.key]}</td><td>${flagTally.v4[f.key]}</td></tr>
  `).join("");

  // Scenario tallies
  const scenTally = { v3: {}, v4: {} };
  SCENARIOS.forEach(sc => { scenTally.v3[sc.key] = 0; scenTally.v4[sc.key] = 0; });
  TOPICS.forEach(t => {
    const blind = state.blinding[t.id];
    const s = state.scores[t.id];
    s.A.scenarios.forEach(k => scenTally[blind.A][k]++);
    s.B.scenarios.forEach(k => scenTally[blind.B][k]++);
  });
  const scenRows = SCENARIOS.map(sc => `
    <tr><td>${sc.label}</td><td>${scenTally.v3[sc.key]}</td><td>${scenTally.v4[sc.key]}</td></tr>
  `).join("");

  const m = state.meta;

  body.innerHTML = `
    <div style="background: var(--warn-soft); border: 1px solid var(--warn); padding: 12px 16px; border-radius: 4px; margin-bottom: 16px;">
      <strong>📤 回傳方式</strong><br>
      點下方「下載 JSON」存檔 → 透過 Telegram / Email / Slack 傳給 Karen<br>
      <small style="color: var(--muted);">（Email: kevenkmupsy@gmail.com · 評分資料目前只在你瀏覽器，不會自動上傳）</small>
    </div>
    <p><strong>評分者</strong>：${escapeHtml(state.rater || "（未填）")} ·
       <strong>整體偏好</strong>：v4 勝 ${v4Pref} · v3 勝 ${v3Pref} · 平手 ${ties}</p>

    <h3>各題總平均 + 偏好（unblind）</h3>
    <table>
      <thead><tr><th>Topic</th><th>Unblind</th><th>A 平均</th><th>B 平均</th><th>偏好</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <h3 style="margin-top:24px;">維度平均（v3 vs v4，跨 5 題）</h3>
    <table>
      <thead><tr><th>維度</th><th>v3</th><th>v4</th><th>Δ (v4 - v3)</th></tr></thead>
      <tbody>${dimAvgRows}</tbody>
    </table>

    <h3 style="margin-top:24px;">Flag 累計（次數）</h3>
    <table>
      <thead><tr><th>Flag</th><th>v3</th><th>v4</th></tr></thead>
      <tbody>${flagRows}</tbody>
    </table>

    <h3 style="margin-top:24px;">場景配對累計（次數）</h3>
    <table>
      <thead><tr><th>場景</th><th>v3</th><th>v4</th></tr></thead>
      <tbody>${scenRows}</tbody>
    </table>

    <h3 style="margin-top:24px;">Meta（跨題後設）</h3>
    <p>跨題一致性：A=<strong>${m.consistency_A ?? "—"}</strong> / B=<strong>${m.consistency_B ?? "—"}</strong>
       · A vs B 區辨度：<strong>${m.distinctiveness ?? "—"}</strong>
       · 整套偏好：<strong>${m.overall_pref ? (m.overall_pref === "tie" ? "tie" : state.blinding[1][m.overall_pref] + "?（注意：以 Topic 1 blinding 為參考；JSON 內含每題對應）") : "—"}</strong></p>
    ${m.meta_comment ? `<p><em>${escapeHtml(m.meta_comment)}</em></p>` : ""}

    <h3 style="margin-top:24px;">每題 Recall + Comment（frown 原料）</h3>
    ${TOPICS.map(t => {
      const s = state.scores[t.id];
      const blind = state.blinding[t.id];
      const hasAny = s.A.recall || s.B.recall || s.comment;
      if (!hasAny) return "";
      return `<div style="margin: 12px 0; padding: 10px; background: var(--bg); border-radius: 4px;">
        <strong>T${t.id}. ${t.title}</strong>（A=${blind.A}, B=${blind.B}）
        ${s.A.recall ? `<div>📘 A recall：${escapeHtml(s.A.recall)}</div>` : ""}
        ${s.B.recall ? `<div>📙 B recall：${escapeHtml(s.B.recall)}</div>` : ""}
        ${s.comment ? `<div>💬 ${escapeHtml(s.comment)}</div>` : ""}
      </div>`;
    }).join("") || "<p style='color:var(--muted);'>（無 recall / comment）</p>"}

    <h3 style="margin-top:24px;">Raw JSON（unblinded）</h3>
    <pre>${escapeHtml(JSON.stringify(buildExport(), null, 2))}</pre>
  `;
  modal.classList.remove("hidden");
}

function hideSummary() {
  document.getElementById("summary-modal").classList.add("hidden");
}

function buildExport() {
  return {
    version: 2,
    rater: state.rater,
    started: state.started,
    exported: new Date().toISOString(),
    topics: TOPICS.map(t => {
      const blind = state.blinding[t.id];
      const s = state.scores[t.id];
      const sideToVersion = side => ({
        version: blind[side],
        scores: Object.fromEntries(DIMENSIONS.map(d => [d.key, s[side][d.key]])),
        flags: s[side].flags,
        recall: s[side].recall,
        scenarios: s[side].scenarios
      });
      return {
        id: t.id,
        title: t.title,
        query: t.query,
        A_was: blind.A,
        B_was: blind.B,
        v3: sideToVersion(blind.A === "v3" ? "A" : "B"),
        v4: sideToVersion(blind.A === "v4" ? "A" : "B"),
        preference_blinded: s.preference,
        preference_version: s.preference ? (s.preference === "tie" ? "tie" : blind[s.preference]) : null,
        comment: s.comment
      };
    }),
    meta: state.meta
  };
}

function downloadJSON() {
  const data = JSON.stringify(buildExport(), null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `dr-ben-eval-${state.rater || "anon"}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(buildExport(), null, 2));
  alert("已複製到剪貼簿");
}

function render() {
  renderTabs();
  renderProgress();
  renderMain();
}

render();
</script>
</body>
</html>
